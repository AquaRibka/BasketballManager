services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: basketballmanager-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 3000
      HOST: 0.0.0.0
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgresql://bm_user:bm_dev_password@postgres:5432/basketball_manager?schema=public}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - dev-network

  postgres:
    image: postgres:16-alpine
    container_name: basketballmanager-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-basketball_manager}
      POSTGRES_USER: ${POSTGRES_USER:-bm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bm_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -h 127.0.0.1 -p 5432 -U ${POSTGRES_USER:-bm_user} -d ${POSTGRES_DB:-basketball_manager}"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - dev-network

volumes:
  postgres_data:

networks:
  dev-network:
    name: basketballmanager-dev-network

services:
  postgres:
    image: postgres:16-alpine
    container_name: basketballmanager-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-basketball_manager}
      POSTGRES_USER: ${POSTGRES_USER:-bm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bm_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bm_user} -d ${POSTGRES_DB:-basketball_manager}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
